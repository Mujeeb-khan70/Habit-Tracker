<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitForge Pro</title>
  <style>
    body { background-color: #12161a; color: #f0f3f5; font-family: sans-serif; margin: 0; display: flex; justify-content: center; padding: 20px; }
    .app-container { width: 100%; max-width: 500px; }
    .top-navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .avatar-btn { width: 42px; height: 42px; border-radius: 50%; background-color: #ff9800; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
    .hidden { display: none !important; }
    .habit-card { background-color: #1a2229; border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid #28333e; }
    .progress-track { width: 100%; height: 8px; background-color: #11171d; border-radius: 10px; overflow: hidden; margin: 10px 0; }
    .progress-fill { height: 100%; background: #ff9800; width: 0%; transition: width 0.3s; }
    .calendar-navbar { display: flex; justify-content: space-between; padding: 10px; align-items: center; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .calendar-cell { padding: 5px; background: #28333e; border-radius: 4px; font-size: 0.8rem; }
    .calendar-cell.completed { background: #58cc02; }
    .auth-card { background: #1a2229; padding: 30px; border-radius: 24px; text-align: center; }
    .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #28333e; background: #11171d; color: white; }
    .auth-btn { width: 100%; padding: 14px; background: #1cb0f6; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="top-navbar">
      <h2>🔥 HabitForge</h2>
      <div class="avatar-btn" id="avatar-btn">U</div>
    </div>

    <div id="auth-view" class="auth-card">
      <input type="email" id="auth-email" class="auth-input" placeholder="Email">
      <input type="password" id="auth-password" class="auth-input" placeholder="Password">
      <button id="auth-btn" class="auth-btn">Sign In</button>
    </div>

    <div id="dashboard-view" class="hidden">
      <div id="habits-list"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBN1YdLiD9GaxS9b0wvzvPnixYGe7vhjbk",
  authDomain: "habit-tracker-937ca.firebaseapp.com",
  projectId: "habit-tracker-937ca",
  storageBucket: "habit-tracker-937ca.firebasestorage.app",
  messagingSenderId: "667829126838",
  appId: "1:667829126838:web:fb5f436362b777e58e0817",
  measurementId: "G-WCHFVVNZX1"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const MILESTONES = [7, 21, 30, 70, 100, 150, 200, 300, 375, 500, 1000];

    let habits = [];
    
    // Auth Logic
    document.getElementById('auth-btn').addEventListener('click', async () => {
      try {
        await signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
      } catch (e) { alert(e.message); }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('dashboard-view').classList.remove('hidden');
        loadData();
      }
    });

    async function loadData() {
      const snap = await getDoc(doc(db, "users_habits", auth.currentUser.uid));
      if (snap.exists()) {
        habits = snap.data().habits.map(h => ({ ...h, viewMonth: new Date().getMonth(), viewYear: new Date().getFullYear() }));
        render();
      }
    }

    window.changeMonth = (id, delta) => {
      const h = habits.find(x => x.id === id);
      h.viewMonth += delta;
      if (h.viewMonth > 11) { h.viewMonth = 0; h.viewYear++; }
      else if (h.viewMonth < 0) { h.viewMonth = 11; h.viewYear--; }
      render();
    };

    function render() {
      const list = document.getElementById('habits-list');
      list.innerHTML = '';
      habits.forEach(h => {
        const target = MILESTONES.find(m => m > h.streak) || 1000;
        const progress = Math.min((h.streak / target) * 100, 100);
        
        const card = document.createElement('div');
        card.className = 'habit-card';
        card.innerHTML = `
          <div><strong>${h.name}</strong> - Streak: ${h.streak}</div>
          <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div class="calendar-navbar">
            <button onclick="changeMonth(${h.id}, -1)">◀</button>
            <span>${h.viewMonth + 1}/${h.viewYear}</span>
            <button onclick="changeMonth(${h.id}, 1)">▶</button>
          </div>
        `;
        list.appendChild(card);
      });
    }
  </script>
</body>
</html>
