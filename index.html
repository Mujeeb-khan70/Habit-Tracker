<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBN1YdLiD9GaxS9b0wvzvPnixYGe7vhjbk",
      authDomain: "habit-tracker-937ca.firebaseapp.com",
      projectId: "habit-tracker-937ca",
      storageBucket: "habit-tracker-937ca.firebasestorage.app",
      messagingSenderId: "667829126838",
      appId: "1:667829126838:web:fb5f436362b777e58e0817",
      measurementId: "G-WCHFVVNZX1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Structural Bindings
    const authView = document.getElementById('auth-view');
    const dashboardView = document.getElementById('dashboard-view');
    const authTitle = document.getElementById('auth-title');
    const usernameRegisterGroup = document.getElementById('username-register-group');
    const authUsername = document.getElementById('auth-username');
    const authEmail = document.getElementById('auth-email');
    const authPassword = document.getElementById('auth-password');
    const authSubmitBtn = document.getElementById('auth-submit-btn');
    const authToggleLink = document.getElementById('auth-toggle-link');
    const authToggleMsg = document.getElementById('auth-toggle-msg');
    
    // Header Refactor Binding Points
    const headerUserBadge = document.getElementById('header-user-badge');
    const userDisplayHandle = document.getElementById('user-display-handle');
    const copyUsernameBtn = document.getElementById('copy-username-btn');
    const dropdownUsernameTxt = document.getElementById('dropdown-username-txt');

    const avatarToggleBtn = document.getElementById('avatar-toggle-btn');
    const avatarDropdownBox = document.getElementById('avatar-dropdown-box');
    const dropdownUserEmail = document.getElementById('dropdown-user-email');
    const logoutActionBtn = document.getElementById('logout-action-btn');

    const tabHabits = document.getElementById('tab-habits');
    const tabFriends = document.getElementById('tab-friends');
    const panelHabits = document.getElementById('panel-habits');
    const panelSocial = document.getElementById('panel-friends');

    const habitForm = document.getElementById('habit-form');
    const habitInput = document.getElementById('habit-input');
    const habitsList = document.getElementById('habits-list');

    const friendSearchInput = document.getElementById('friend-search-input');
    const friendSearchBtn = document.getElementById('friend-search-btn');
    const searchResultsZone = document.getElementById('search-results-zone');
    const friendsListZone = document.getElementById('friends-list-zone');

    const milestoneModal = document.getElementById('milestone-modal');
    const milestoneText = document.getElementById('milestone-text');

    let habits = [];
    let currentUser = null;
    let myUsername = "";
    let myFriendsList = [];
    let isLoginMode = true;

    const MILESTONE_TIERS = [7, 21, 30, 70, 100, 150, 200, 300, 375, 500, 1000];

    // Navigation Tabs Controller
    tabHabits.addEventListener('click', () => {
      tabHabits.classList.add('active'); tabFriends.classList.remove('active');
      panelHabits.classList.remove('hidden'); panelSocial.classList.add('hidden');
    });

    tabFriends.addEventListener('click', () => {
      tabFriends.classList.add('active'); tabHabits.classList.remove('active');
      panelSocial.classList.remove('hidden'); panelHabits.classList.add('hidden');
      loadFriendsListUI();
    });

    avatarToggleBtn.addEventListener('click', (e) => { e.stopPropagation(); avatarDropdownBox.classList.toggle('hidden'); });
    document.addEventListener('click', () => avatarDropdownBox.classList.add('hidden'));

    // Copy Action Helper Function
    copyUsernameBtn.addEventListener('click', () => {
      if(!myUsername) return;
      navigator.clipboard.writeText(`@${myUsername}`);
      const baseText = copyUsernameBtn.innerText;
      copyUsernameBtn.innerText = "Copied! ✓";
      setTimeout(() => { copyUsernameBtn.innerText = baseText; }, 2000);
    });

    // Toggle Login / Signup View
    authToggleLink.addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      authTitle.innerText = isLoginMode ? "Log In to Your Account" : "Create Your Free Account";
      authSubmitBtn.innerText = isLoginMode ? "Sign In" : "Sign Up & Sync";
      authToggleMsg.innerText = isLoginMode ? "New to HabitForge?" : "Already have an account?";
      authToggleLink.innerText = isLoginMode ? "Create an account" : "Log in here";
      if(isLoginMode) usernameRegisterGroup.classList.add('hidden');
      else usernameRegisterGroup.classList.remove('hidden');
    });

    // Unified Authentication Click Trigger
    authSubmitBtn.addEventListener('click', async () => {
      const email = authEmail.value.trim(); const password = authPassword.value;
      const username = authUsername.value.trim().toLowerCase().replace('@', '');
      
      if (!email || !password) { alert("Please fill out all fields."); return; }
      if (!isLoginMode && !username) { alert("Please pick a username."); return; }

      try {
        if (isLoginMode) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          const nameCheck = await getDoc(doc(db, "usernames", username));
          if(nameCheck.exists()) { alert("Username already taken! Choose another."); return; }

          // Optimistic state injection before firebase triggers sync hooks
          myUsername = username;
          
          const credential = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, "usernames", username), { uid: credential.user.uid });
          await setDoc(doc(db, "users_habits", credential.user.uid), { habits: [], email: email, username: username, friends: [] });
        }
      } catch (e) { alert(e.message); }
    });

    logoutActionBtn.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        dropdownUserEmail.innerText = user.email;
        avatarToggleBtn.innerText = user.email.charAt(0).toUpperCase();
        authView.classList.add('hidden'); dashboardView.classList.remove('hidden');
        await syncLoadHabitsFromCloud();
      } else {
        currentUser = null; habits = []; myFriendsList = []; myUsername = "";
        headerUserBadge.classList.add('hidden');
        dashboardView.classList.add('hidden'); authView.classList.remove('hidden');
      }
    });

    // Cloud DB Synchronizers
    async function saveHabitsToCloud() {
      if (!currentUser) return;
      try {
        await setDoc(doc(db, "users_habits", currentUser.uid), { 
          habits: habits, email: currentUser.email, username: myUsername, friends: myFriendsList 
        });
      } catch (error) { console.error("Database sync failed:", error); }
    }

    async function syncLoadHabitsFromCloud() {
      if (!currentUser) return;
      const snap = await getDoc(doc(db, "users_habits", currentUser.uid));
      if (snap.exists()) {
        const data = snap.data();
        habits = data.habits || [];
        myFriendsList = data.friends || [];
        
        // If local memory state already captured signup username, honor it. Otherwise read db value.
        if(!myUsername) {
          myUsername = data.username || "user";
        }
        
        // Render identity metrics directly to interface headers
        userDisplayHandle.innerText = `@${myUsername}`;
        dropdownUsernameTxt.innerText = `@${myUsername}`;
        headerUserBadge.classList.remove('hidden');
        
        habits.forEach(h => {
          if (h.viewMonth === undefined) h.viewMonth = new Date().getMonth();
          if (h.viewYear === undefined) h.viewYear = new Date().getFullYear();
        });
        renderHabits();
      }
    }

    // Real-Time Friends Lookup
    friendSearchBtn.addEventListener('click', async () => {
      const targetQuery = friendSearchInput.value.trim().toLowerCase().replace('@', '');
      searchResultsZone.innerHTML = `<p style='color:#6c7a86;'>Searching platform databases...</p>`;
      
      if(targetQuery === myUsername) { searchResultsZone.innerHTML = `<p style='color:#ea4335;'>You cannot add yourself!</p>`; return; }

      const nameDoc = await getDoc(doc(db, "usernames", targetQuery));
      if(nameDoc.exists()) {
        const targetUid = nameDoc.data().uid;
        searchResultsZone.innerHTML = `
          <div class="search-result-box">
            <span style="font-weight:bold; color:white;">✨ @${targetQuery} Found!</span>
            <button class="submit-action-btn" id="add-friend-exec-btn" style="padding: 6px 14px;">Add +</button>
          </div>
        `;
        document.getElementById('add-friend-exec-btn').addEventListener('click', async () => {
          if(!myFriendsList.includes(targetUid)) {
            myFriendsList.push(targetUid);
            await saveHabitsToCloud();
            alert(`@${targetQuery} successfully added to your network!`);
            friendSearchInput.value = ''; searchResultsZone.innerHTML = '';
            loadFriendsListUI();
          } else { alert("User is already your friend!"); }
        });
      } else { searchResultsZone.innerHTML = `<p style='color:#ea4335;'>User @${targetQuery} not found online.</p>`; }
    });

    // Friends List Dashboard
    async function loadFriendsListUI() {
      friendsListZone.innerHTML = `<p style="color:#6c7a86; text-align:center;">Syncing live tracking channels...</p>`;
      if(myFriendsList.length === 0) {
        friendsListZone.innerHTML = `<p style="color:#6c7a86; text-align:center;">Your friends network is currently empty. Search for users above!</p>`;
        return;
      }

      let completeNetworkHTML = '';
      for (let friendUid of myFriendsList) {
        const friendSnap = await getDoc(doc(db, "users_habits", friendUid));
        if(friendSnap.exists()) {
          const fData = friendSnap.data();
          const fName = fData.username || "Anonymous";
          const fHabits = fData.habits || [];
          const aggregateScore = fHabits.reduce((acc, h) => acc + (h.history ? h.history.length : 0), 0);
          
          completeNetworkHTML += `
            <div class="friend-row">
              <span class="friend-name">👤 @${fName}</span>
              <span class="friend-score">🔥 ${aggregateScore} points</span>
            </div>
          `;
        }
      }
      friendsListZone.innerHTML = completeNetworkHTML;
    }

    // Input Execution Engine
    habitForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = habitInput.value.trim();
      const newHabit = {
        id: Date.now(), name: text, streak: 0, lastCompleted: null, history: [],
        showCalendar: false, showAnalytics: false,
        viewMonth: new Date().getMonth(), viewYear: new Date().getFullYear()
      };
      habits.push(newHabit); habitInput.value = '';
      renderHabits(); saveHabitsToCloud();
    });

    function getMilestoneMetrics(streak) {
      let currentTarget = MILESTONE_TIERS[0];
      for (let i = 0; i < MILESTONE_TIERS.length; i++) {
        if (streak < MILESTONE_TIERS[i]) { currentTarget = MILESTONE_TIERS[i]; break; }
      }
      return { target: currentTarget, percentage: Math.min((streak / currentTarget) * 100, 100) };
    }

    function renderHabits() {
      habitsList.innerHTML = '';
      const today = new Date().setHours(0,0,0,0);
      const oneDayInMs = 24 * 60 * 60 * 1000;

      habits.forEach(habit => {
        let statusMessage = "Keep up the work! 🌱";
        if (habit.lastCompleted) {
          const daysPassed = Math.floor((today - new Date(habit.lastCompleted).setHours(0,0,0,0)) / oneDayInMs);
          if (daysPassed === 1) statusMessage = "⚠️ Missed yesterday! Log it today to keep the streak alive.";
          else if (daysPassed > 1) { habit.streak = 0; statusMessage = "Streak reset. Let's build it back up!"; }
          else if (daysPassed === 0) statusMessage = "✅ Logged for today!";
        }

        const isDoneToday = habit.lastCompleted && new Date(habit.lastCompleted).setHours(0,0,0,0) === today;
        const metrics = getMilestoneMetrics(habit.streak);

        const card = document.createElement('div');
        card.className = 'habit-card';
        card.innerHTML = `
          <div class="habit-header">
            <span class="habit-title">${habit.name}</span>
            <span class="streak-badge">🔥 ${habit.streak}</span>
          </div>
          <div class="milestone-container">
            <div class="milestone-meta"><span>📊 ${habit.streak} Completed</span><span style="color:#ff9800;">Target: ${metrics.target} Days</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${metrics.percentage}%;"></div></div>
          </div>
          <p class="motivation-msg">${statusMessage}</p>
          <div class="habit-actions">
            <button class="${isDoneToday ? 'btn-complete checked':'btn-complete'}" id="comp-${habit.id}">${isDoneToday ? '✓ Done':'Complete'}</button>
            <button class="btn-analytics" id="anl-${habit.id}">📊 Chart</button>
            <button class="btn-calendar" id="cal-${habit.id}">📅 Calendar</button>
            <button class="btn-delete" id="del-${habit.id}">Delete</button>
          </div>
          <div id="anl-box-${habit.id}"></div><div id="cal-box-${habit.id}"></div>
        `;
        habitsList.appendChild(card);

        document.getElementById(`comp-${habit.id}`).addEventListener('click', () => toggleCompleteHabit(habit.id));
        document.getElementById(`anl-${habit.id}`).addEventListener('click', () => toggleAnalytics(habit.id));
        document.getElementById(`cal-${habit.id}`).addEventListener('click', () => toggleCalendar(habit.id));
        document.getElementById(`del-${habit.id}`).addEventListener('click', () => deleteHabit(habit.id));

        if (habit.showAnalytics) renderAnalyticsPanel(habit);
        if (habit.showCalendar) renderCalendarPanel(habit);
      });
    }

    function toggleCompleteHabit(id) {
      const habit = habits.find(h => h.id === id); if (!habit) return;
      const todayObj = new Date();
      const formattedToday = `${todayObj.getFullYear()}-${String(todayObj.getMonth() + 1).padStart(2, '0')}-${String(todayObj.getDate()).padStart(2, '0')}`;
      const doneToday = habit.lastCompleted && new Date(habit.lastCompleted).setHours(0,0,0,0) === todayObj.setHours(0,0,0,0);

      if (doneToday) {
        if (habit.streak > 0) habit.streak -= 1;
        habit.history = habit.history.filter(d => d !== formattedToday);
        habit.lastCompleted = habit.history.length > 0 ? new Date(habit.history.sort().reverse()[0]).getTime() : null;
      } else {
        habit.streak += 1; habit.lastCompleted = Date.now();
        if (!habit.history.includes(formattedToday)) habit.history.push(formattedToday);
        if (MILESTONE_TIERS.includes(habit.streak)) triggerMilestoneCelebration(habit.name, habit.streak);
      }
      renderHabits(); saveHabitsToCloud();
    }

    function triggerMilestoneCelebration(name, val) {
      milestoneText.innerHTML = `Focus unlocked! You logged <strong>"${name}"</strong> for <strong>${val} days</strong> straight!`;
      milestoneModal.classList.remove('hidden');
    }

    function toggleAnalytics(id) { const h = habits.find(x => x.id === id); h.showAnalytics = !h.showAnalytics; renderHabits(); }
    function renderAnalyticsPanel(h) {
      const occurrences = h.history ? h.history.length : 0;
      document.getElementById(`anl-box-${h.id}`).innerHTML = `
        <div class="analytics-panel">
          <div class="analytics-grid">
            <div class="metric-box"><div class="metric-val">${occurrences}</div><div class="metric-lbl">Total Logs</div></div>
            <div class="metric-box"><div class="metric-val">🔥 ${h.streak}</div><div class="metric-lbl">Streak</div></div>
          </div>
        </div>`;
    }

    function toggleCalendar(id) { const h = habits.find(x => x.id === id); h.showCalendar = !h.showCalendar; renderHabits(); }
    function renderCalendarPanel(habit) {
      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      const totalDays = new Date(habit.viewYear, habit.viewMonth + 1, 0).getDate();
      const firstDay = new Date(habit.viewYear, habit.viewMonth, 1).getDay();
      
      document.getElementById------------(---------).innerHTML = `
        <div class="calendar-view">
          <div class="calendar-navbar">
            <button class="calendar-nav-btn" id="prev-${habit.id}">◀</button>
            <strong>${monthNames[habit.viewMonth]} ${habit.viewYear}</strong>
            <button class="calendar-nav-btn" id="next-${habit.id}">▶</button>
          </div>
          <div class="calendar-grid" id="grid-${habit.id}"></div>
        </div>`;

      const grid = document.getElementById(`grid-${habit.id}`);
      ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="calendar-day-label">${d}</div>`);
      for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="calendar-cell empty"></div>`;
      for(let d=1; d<=totalDays; d++) {
        const dStr = `${habit.viewYear}-${String(habit.viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        grid.innerHTML += `<div class="calendar-cell ${habit.history.includes(dStr) ? 'completed':''}">${d}</div>`;
      }
      document.getElementById(`prev-${habit.id}`).addEventListener('click', () => changeMonth(habit.id, -1));
      document.getElementById(`next-${habit.id}`).addEventListener('click', () => changeMonth(habit.id, 1));
    }

    function changeMonth(id, delta) {
      const h = habits.find(x => x.id === id); h.viewMonth += delta;
      if (h.viewMonth > 11) { h.viewMonth = 0; h.viewYear++; }
      else if (h.viewMonth < 0) { h.viewMonth = 11; h.viewYear--; }
      renderHabits();
    }

    async function deleteHabit(id) { if(confirm("Delete habit?")) { habits = habits.filter(h => h.id !== id); renderHabits(); saveHabitsToCloud(); } }
    window.closeModal = function() { milestoneModal.classList.add('hidden'); }
  </script>
