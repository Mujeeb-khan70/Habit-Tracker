<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Forge - Masters Edition</title>
  <style>
    body { background-color: #12161a; color: #f0f3f5; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; padding: 20px; }
    .app-container { width: 100%; max-width: 500px; }
    .auth-card { background-color: #1a2229; padding: 30px; border-radius: 24px; border: 2px solid #28333e; text-align: center; }
    .auth-group { margin-bottom: 20px; text-align: left; }
    .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #28333e; background-color: #11171d; color: white; box-sizing: border-box; }
    .error-msg { color: #ff4b4b; font-size: 0.8rem; display: block; margin-top: 5px; height: 1rem; }
    .auth-btn { width: 100%; background-color: #1cb0f6; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; margin-top: 10px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="auth-view" class="auth-card">
      <h2 id="auth-title">Log In</h2>
      
      <div id="username-register-group" class="auth-group hidden">
        <label>Username</label>
        <input type="text" id="auth-username" class="auth-input">
      </div>

      <div class="auth-group">
        <label>Email</label>
        <input type="email" id="auth-email" class="auth-input">
        <span id="email-error" class="error-msg"></span>
      </div>
      
      <div class="auth-group">
        <label>Password</label>
        <input type="password" id="auth-password" class="auth-input">
        <span id="password-error" class="error-msg"></span>
      </div>

      <div id="confirm-password-group" class="auth-group hidden">
        <label>Confirm Password</label>
        <input type="password" id="auth-confirm-password" class="auth-input">
        <span id="confirm-error" class="error-msg"></span>
      </div>

      <button id="auth-submit-btn" class="auth-btn">Sign In</button>
      <button id="auth-guest-btn" class="auth-btn" style="background:#4b5a6a;">Continue as Guest</button>
      <p id="auth-toggle-link" style="cursor:pointer; color:#1cb0f6; text-decoration:underline;">Create an account</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, linkWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const auth = getAuth(initializeApp({ /* Add your config here */ }));
    
    // Selectors
    const emailInput = document.getElementById('auth-email');
    const passwordInput = document.getElementById('auth-password');
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');
    const confirmError = document.getElementById('confirm-error');

    // Clear errors on input
    [emailInput, passwordInput].forEach(el => el.addEventListener('input', () => {
      emailError.innerText = ""; passwordError.innerText = ""; confirmError.innerText = "";
    }));

    document.getElementById('auth-submit-btn').addEventListener('click', async () => {
      const email = emailInput.value;
      const password = passwordInput.value;
      
      try {
        emailError.innerText = ""; passwordError.innerText = "";
        
        // Logic for Login vs Register
        if (isLoginMode) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          // If Guest exists, link instead of creating new
          if (auth.currentUser?.isAnonymous) {
             await linkWithCredential(auth.currentUser, EmailAuthProvider.credential(email, password));
          } else {
             await createUserWithEmailAndPassword(auth, email, password);
          }
        }
      } catch (e) {
        if (e.code === 'auth/email-already-in-use') emailError.innerText = "Email is already registered.";
        else if (e.code === 'auth/wrong-password') passwordError.innerText = "Incorrect password.";
        else if (e.code === 'auth/user-not-found') emailError.innerText = "No account with this email.";
        else if (e.code === 'auth/invalid-credential') passwordError.innerText = "Invalid credentials.";
        else alert(e.message);
      }
    });
  </script>
</body>
</html>
